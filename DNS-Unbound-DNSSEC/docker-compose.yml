# Docker Compose para ambiente com Portainer e dois servidores Unbound
# Versão do Compose comentada porque a sintaxe atual do Docker aceita sem ela.
#version: '3'

services:
  # Interface web de administração do Docker
  portainer:
    image: portainer/portainer-ce
    container_name: srv01-portainer-freeway
    restart: unless-stopped
    ports:
      - 9000:9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      srv01-docker-net:
        ipv4_address: 192.168.100.110
        ipv6_address: fd00:100:200::110

  # Servidor DNS Unbound primário
  unbound-primary:
    container_name: unbound-primary
    image: custom-unbound
    networks:
      srv01-docker-net:
        ipv4_address: 192.168.100.111
        ipv6_address: fd00:100:200::111
    volumes:
      - /home/docker/my-docker-setup/opt/unbound_01/etc/unbound/:/opt/unbound/etc/unbound
    ports:
      - "5301:53/tcp"
      - "5301:53/udp"
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "cnn.com"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    restart: unless-stopped

  # Servidor DNS Unbound secundário
  unbound-secondary:
    container_name: unbound-secondary
    image: custom-unbound
    networks:
      srv01-docker-net:
        ipv4_address: 192.168.100.112
        ipv6_address: fd00:100:200::112
    volumes:
      - /home/docker/my-docker-setup/opt/unbound_02/etc/unbound/:/opt/unbound/etc/unbound
    ports:
      - "5302:53/tcp"
      - "5302:53/udp"
    healthcheck:
      test: ["CMD", "dig", "@127.0.0.1", "nasa.org"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    restart: unless-stopped

volumes:
  # Volume persistente usado pelo Portainer
  portainer_data:

networks:
  # Rede customizada para IPs fixos dos containers
  srv01-docker-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 192.168.100.0/24
        - subnet: fd00:100:200::/64

